<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Invalid Link</title>
<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0a0f1a;
    color: #e2e8f0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 20px;
}
.wrap {
    max-width: 420px;
    text-align: center;
    background: rgba(255,255,255,.04);
    border-radius: 16px;
    padding: 40px 24px;
    border: 1px solid rgba(255,255,255,.06);
}
.icon {
    font-size: 48px;
    margin-bottom: 16px;
}
h1 { margin: 0 0 8px; font-size: 22px; }
p { color: #94a3b8; font-size: 14px; margin: 0; }
</style>
</head>
<body>
<div class="wrap">
    <div class="icon">🔒</div>
    <h1>Invalid or expired link</h1>
    <p>This portal link is not valid. Please ask your academy for a new link or scan your personal QR code again.</p>
</div>
</body>
</html>
