<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — Fit4Academy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'DM Sans',sans-serif;}
        body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0f172a;padding:24px;}
        .card{width:100%;max-width:440px;background:#fff;border-radius:18px;padding:40px 36px;box-shadow:0 24px 60px rgba(0,0,0,.25);}
        .logo{display:flex;align-items:center;gap:12px;margin-bottom:24px;}
        .logo-icon{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,#00DC82,#059669);display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Space Grotesk';font-weight:700;}
        .logo span{font-family:'Space Grotesk';font-size:20px;font-weight:700;color:#0f172a;}
        .logo span em{font-style:normal;color:#00DC82;}
        h2{font-family:'Space Grotesk';font-size:24px;font-weight:700;color:#0f172a;margin-bottom:6px;}
        .sub{font-size:14px;color:#94a3b8;margin-bottom:24px;}
        .msg{padding:12px 16px;border-radius:10px;font-size:13px;margin-bottom:16px;}
        .msg.err{background:#fef2f2;color:#991b1b;border:1px solid #fecaca;}
        label{font-size:12px;font-weight:600;color:#475569;margin-bottom:6px;display:block;letter-spacing:.3px;}
        .iw{display:flex;align-items:center;border:1.5px solid #e2e8f0;border-radius:12px;background:#f8fafc;margin-bottom:18px;}
        .iw:focus-within{border-color:#00DC82;background:#fff;box-shadow:0 0 0 3px rgba(0,220,130,.08);}
        .iw i{padding:0 14px;color:#94a3b8;font-size:18px;}
        .iw input{flex:1;padding:14px 14px 14px 0;border:none;background:transparent;font-size:15px;color:#0f172a;outline:none;}
        .btn{width:100%;padding:16px;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#00DC82,#00B368);color:#fff;font-family:'Space Grotesk';display:flex;align-items:center;justify-content:center;gap:8px;}
        .btn:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(0,220,130,.35);}
        .links{text-align:center;margin-top:18px;font-size:13px;}
        .links a{color:#00DC82;font-weight:600;text-decoration:none;}
        .links a:hover{text-decoration:underline;}
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <div class="logo-icon">F4</div>
            <span>Fit4<em>Academy</em></span>
        </div>
        <h2>Set a new password</h2>
        <p class="sub">Choose a strong password — at least 8 characters.</p>

        {% if error %}<div class="msg err"><i class="bi bi-exclamation-circle"></i> {{ error }}</div>{% endif %}

        {% if token %}
        <form method="post">
            <label>New password</label>
            <div class="iw">
                <i class="bi bi-lock"></i>
                <input type="password" name="password" placeholder="At least 8 characters" autofocus required>
            </div>
            <label>Confirm new password</label>
            <div class="iw">
                <i class="bi bi-lock-fill"></i>
                <input type="password" name="confirm" placeholder="Re-enter password" required>
            </div>
            <button type="submit" class="btn"><i class="bi bi-shield-check"></i> Update password</button>
        </form>
        {% else %}
        <div class="links">
            <a href="/forgot-password"><i class="bi bi-arrow-clockwise"></i> Request a new link</a>
        </div>
        {% endif %}

        <div class="links" style="margin-top:14px;">
            <a href="/login"><i class="bi bi-arrow-left"></i> Back to sign in</a>
        </div>
    </div>
</body>
</html>
