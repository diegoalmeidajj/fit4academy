<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bug Report — Fit4Academy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'DM Sans',sans-serif;}
        h1,h2,h3{font-family:'Space Grotesk',sans-serif;}
        body{min-height:100vh;background:#0f172a;color:#f1f5f9;display:flex;align-items:center;justify-content:center;padding:40px 20px;}

        .bug-container{max-width:600px;width:100%;}
        .bug-header{text-align:center;margin-bottom:32px;}
        .bug-logo{width:60px;height:60px;border-radius:16px;background:linear-gradient(135deg,#00DC82,#059669);display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Space Grotesk';font-size:22px;font-weight:700;margin:0 auto 16px;}
        .bug-header h1{font-size:26px;font-weight:700;letter-spacing:-.5px;}
        .bug-header p{font-size:14px;color:rgba(255,255,255,.5);margin-top:6px;}

        .bug-form{background:#1e293b;border:1px solid #334155;border-radius:16px;padding:28px;}
        .fg{margin-bottom:18px;}
        .fg label{font-size:12px;font-weight:600;color:#94a3b8;margin-bottom:6px;display:block;letter-spacing:.3px;}
        .fg input,.fg textarea,.fg select{width:100%;padding:12px 14px;border-radius:10px;border:1.5px solid #334155;background:#0f172a;color:#f1f5f9;font-size:14px;font-family:'DM Sans';outline:none;transition:all .2s;}
        .fg input:focus,.fg textarea:focus,.fg select:focus{border-color:#00DC82;box-shadow:0 0 0 3px rgba(0,220,130,.12);}
        .fg input::placeholder,.fg textarea::placeholder{color:#475569;}
        .fg textarea{min-height:120px;resize:vertical;}
        .fg select option{background:#1e293b;color:#f1f5f9;}

        .file-upload{border:2px dashed #334155;border-radius:12px;padding:24px;text-align:center;cursor:pointer;transition:all .2s;color:#64748b;}
        .file-upload:hover{border-color:#00DC82;color:#6ee7b7;}
        .file-upload i{font-size:28px;display:block;margin-bottom:6px;}
        .file-upload input{display:none;}
        .file-preview{margin-top:10px;max-height:120px;border-radius:8px;display:none;}

        .btn-submit{width:100%;padding:16px;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#00DC82,#00B368);color:#fff;box-shadow:0 4px 16px rgba(0,220,130,.25);transition:all .2s;font-family:'Space Grotesk';display:flex;align-items:center;justify-content:center;gap:8px;}
        .btn-submit:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(0,220,130,.35);}

        .back-link{display:block;text-align:center;margin-top:20px;color:#00DC82;font-weight:600;font-size:13px;}
        .back-link:hover{text-decoration:underline;}

        .success-msg{background:#064e3b;border:1px solid #065f46;color:#a7f3d0;padding:16px;border-radius:12px;text-align:center;margin-bottom:20px;display:flex;align-items:center;justify-content:center;gap:8px;font-size:14px;}

        @media(max-width:480px){
            body{padding:20px 12px;}
            .bug-form{padding:20px;}
            .bug-header h1{font-size:22px;}
        }
    </style>
</head>
<body>
    <div class="bug-container">
        <div class="bug-header">
            <div class="bug-logo">F4</div>
            <h1 data-i18n="bug_title">Report a Bug</h1>
            <p data-i18n="bug_subtitle">Help us improve Fit4Academy by reporting issues you encounter</p>
        </div>

        {% if success %}
        <div class="success-msg"><i class="bi bi-check-circle-fill"></i> <span data-i18n="bug_success">Thank you! Your report has been submitted.</span></div>
        {% endif %}

        <div class="bug-form">
            <form method="post" enctype="multipart/form-data">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div class="fg">
                    <label data-i18n="bug_title_label">Title *</label>
                    <input type="text" name="title" placeholder="Brief description of the issue" data-i18n-placeholder="bug_title_ph" required>
                </div>

                <div class="fg">
                    <label data-i18n="bug_severity">Severity</label>
                    <select name="severity">
                        <option value="low" data-i18n="bug_low">Low — cosmetic issue</option>
                        <option value="medium" selected data-i18n="bug_medium">Medium — feature not working correctly</option>
                        <option value="high" data-i18n="bug_high">High — major feature broken</option>
                        <option value="critical" data-i18n="bug_critical">Critical — system unusable</option>
                    </select>
                </div>

                <div class="fg">
                    <label data-i18n="bug_desc_label">Description *</label>
                    <textarea name="description" placeholder="What happened? What did you expect to happen? Steps to reproduce..." data-i18n-placeholder="bug_desc_ph" required></textarea>
                </div>

                <div class="fg">
                    <label data-i18n="bug_screenshot">Screenshot (optional)</label>
                    <label class="file-upload" onclick="document.getElementById('screenshotInput').click();">
                        <i class="bi bi-image"></i>
                        <span data-i18n="bug_screenshot_upload">Click to upload a screenshot</span>
                        <input type="file" name="screenshot" id="screenshotInput" accept="image/*" onchange="previewScreenshot(this)">
                    </label>
                    <img class="file-preview" id="screenshotPreview">
                </div>

                <div class="fg">
                    <label data-i18n="bug_email_label">Your email (optional)</label>
                    <input type="email" name="email" placeholder="so we can follow up" data-i18n-placeholder="bug_email_ph">
                </div>

                <button type="submit" class="btn-submit"><i class="bi bi-bug"></i> <span data-i18n="bug_submit">Submit Report</span></button>
            </form>
        </div>

        <a href="/" class="back-link"><i class="bi bi-arrow-left"></i> <span data-i18n="bug_back">Back to Fit4Academy</span></a>
    </div>

    <script>
    function previewScreenshot(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const preview = document.getElementById('screenshotPreview');
                preview.src = e.target.result;
                preview.style.display = 'block';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }
    </script>
</body>
</html>
